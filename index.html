<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 10px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 10px; border-radius: 10px; text-align: center; }
        .btn { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="catalog" class="container">
        <p>Загрузка товаров...</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Читаем данные из ссылки (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const dataRaw = urlParams.get('data');
        
        if (dataRaw) {
            const products = JSON.parse(decodeURIComponent(dataRaw));
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = ''; // Очищаем текст загрузки

            // 2. Рисуем карточки для каждого товара из базы
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = 
                    <h3>${p.name}</h3>
                    <p>${p.price} ₽</p>
                    <button class="btn" onclick="order(${p.id}, '${p.name}', ${p.price})">Купить</button>
                ;
                catalog.appendChild(card);
            });
        }

        function order(id, name, price) {
            tg.sendData(JSON.stringify([{id, name, price}]));
            tg.close();
        }
    </script>
</body>
</html>
