<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkShop 3D Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --btn: var(--tg-theme-button-color, #3390ec);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .categories { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .cat-btn { background: var(--sec-bg); color: var(--text); border: none; padding: 8px 15px; border-radius: 15px; white-space: nowrap; }
        .cat-btn.active { background: var(--btn); color: var(--btn-text); }
        .product-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--sec-bg); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; }
        .card h3 { font-size: 14px; margin: 8px 0 4px; }
        .card .price { font-weight: bold; color: var(--btn); margin-bottom: 8px; }
        .btn-add { background: var(--btn); color: var(--btn-text); border: none; padding: 7px; border-radius: 6px; width: 100%; font-weight: bold; }
        .count-group { display: flex; justify-content: space-between; align-items: center; background: var(--bg); border-radius: 6px; }
        .btn-min, .btn-pls { background: var(--btn); color: var(--btn-text); border: none; width: 30px; height: 30px; border-radius: 4px; }
        #loading { text-align: center; margin-top: 50px; color: var(--hint); }
    </style>
</head>
<body>
    <div class="categories">
        <button class="cat-btn active" onclick="filter('Все')">Все</button>
        <button class="cat-btn" onclick="filter('Лазеры')">Лазеры</button>
        <button class="cat-btn" onclick="filter('Насадки')">Насадки</button>
    </div>
    <div id="loading">Загрузка...</div>
    <div class="product-list" id="products"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        // ЗАМЕНИ ССЫЛКУ НИЖЕ
        const API_URL = "https://widespread-paths-shanghai-introductory.trycloudflare.com/get_products";
        const BASE_URL = API_URL.replace('/get_products', '');
        let allItems = [], cart = {};

        async function load() {
            try {
                const r = await fetch(API_URL);
                allItems = await r.json();
                document.getElementById('loading').style.display = 'none';
                render(allItems);
            } catch { document.getElementById('loading').innerText = "Ошибка сети"; }
        }

        function render(items) {
            const container = document.getElementById('products');
            container.innerHTML = '';
            items.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${p.image || ''}">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} ₽</div>
                    <div id="ctrl-${p.id}"><button class="btn-add" onclick="update(${p.id},'${p.name}',${p.price},1)">В корзину</button></div>
                `;
                container.appendChild(div);
            });
        }

        function filter(c) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === c));
            render(c === 'Все' ? allItems : allItems.filter(p => p.category === c));
        }

        function update(id, n, p, d) {
            if (!cart[id]) cart[id] = { name: n, price: p, count: 0 };
            cart[id].count += d;
            const ctrl = document.getElementById(`ctrl-${id}`);
            if (cart[id].count <= 0) {
                delete cart[id];
                ctrl.innerHTML = `<button class="btn-add" onclick="update(${id},'${n}',${p},1)">В корзину</button>`;
            } else {
                ctrl.innerHTML = `<div class="count-group">
                    <button class="btn-min" onclick="update(${id},'${n}',${p},-1)">-</button>
                    <span>${cart[id].count}</span>
                    <button class="btn-pls" onclick="update(${id},'${n}',${p},1)">+</button>
                </div>`;
            }
            const total = Object.values(cart).reduce((s, i) => s + i.price * i.count, 0);
            if (total > 0) { tg.MainButton.setText(`КУПИТЬ: ${total} ₽`).show(); } else { tg.MainButton.hide(); }
        }

        tg.onEvent('mainButtonClicked', async () => {
            tg.MainButton.showProgress();
            await fetch(`${BASE_URL}/place_order`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: tg.initDataUnsafe?.user?.id || 0,
                    user_name: tg.initDataUnsafe?.user?.first_name || "Guest",
                    items: Object.values(cart),
                    total_price: Object.values(cart).reduce((s, i) => s + i.price * i.count, 0)
                })
            });
            tg.MainButton.hideProgress();
            tg.showAlert("Заказ оформлен!");
            tg.close();
        });
        load();
    </script>
</body>
</html>
