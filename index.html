<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkShop 3D Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --btn: var(--tg-theme-button-color, #3390ec);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            -webkit-user-select: none;
        }

        .header { margin-bottom: 20px; }
        .header h1 { font-size: 22px; margin: 0; }
        .header p { color: var(--hint); font-size: 14px; margin: 5px 0 0; }

        .product-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: var(--sec-bg);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.1s;
        }

        .card:active { transform: scale(0.98); }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
            background: #eee;
        }

        .card h3 { font-size: 15px; margin: 10px 0 4px; font-weight: 600; }
        .card .desc { font-size: 12px; color: var(--hint); margin-bottom: 8px; flex-grow: 1; }
        .card .price { font-weight: bold; color: var(--btn); margin-bottom: 10px; }

        .controls { display: flex; align-items: center; justify-content: space-between; }
        
        .btn-add {
            background: var(--btn);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            padding: 8px;
            width: 100%;
            font-weight: bold;
            font-size: 14px;
        }

        .count-group {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            border-radius: 8px;
            overflow: hidden;
        }

        .btn-minus, .btn-plus {
            background: var(--btn);
            color: var(--btn-text);
            border: none;
            width: 35px;
            height: 32px;
            font-size: 18px;
            font-weight: bold;
        }

        .count-value { font-weight: bold; width: 30px; text-align: center; }
        
        #loading { text-align: center; padding: 50px; color: var(--hint); }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="user-name">Мастерская</h1>
        <p>Выбирайте запчасти и лазеры</p>
    </div>

    <div id="loading">Загрузка товаров...</div>
    <div class="product-list" id="products"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Ссылка будет заменена твоим скриптом автоматически
        const API_URL = "https://connections-documented-kinase-psychology.trycloudflare.com/get_products";
        const BASE_URL = API_URL.replace('/get_products', '');

        let cart = {};

        // Приветствие пользователя
        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-name').innerText = Привет, ${tg.initDataUnsafe.user.first_name}!;
        }

        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                document.getElementById('loading').style.display = 'none';
                
                const container = document.getElementById('products');
                container.innerHTML = '';

                products.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = 
                        <img src="${p.image || 'https://via.placeholder.com/150'}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <div class="desc">${p.description || ''}</div>
                        <div class="price">${p.price} ₽</div>
                        <div id="item-ctrl-${p.id}">
                            <button class="btn-add" onclick="updateCart(${p.id}, '${p.name}', ${p.price}, 1)">В корзину</button>
                        </div>
                    ;
                    container.appendChild(div);
                });
            } catch (e) {
                document.getElementById('loading').innerText = "Ошибка загрузки товаров. Проверьте сервер.";
            }
        }

        function updateCart(id, name, price, delta) {
            if (!cart[id]) {
                cart[id] = { name, price, count: 0 };
            }
            
            cart[id].count += delta;

            if (cart[id].count <= 0) {
                delete cart[id];
                document.getElementById(item-ctrl-${id}).innerHTML = 
                    <button class="btn-add" onclick="updateCart(${id}, '${name}', ${price}, 1)">В корзину</button>;
            } else {
                document.getElementById(item-ctrl-${id}).innerHTML = 
                    <div class="count-group">
                        <button class="btn-minus" onclick="updateCart(${id}, '${name}', ${price}, -1)">–</button>
                        <span class="count-value">${cart[id].count}</span>
                        <button class="btn-plus" onclick="updateCart(${id}, '${name}', ${price}, 1)">+</button>
                    </div>
                ;
            }
            renderMainButton();
        }

        function renderMainButton() {
            const items = Object.values(cart);
            const total = items.reduce((sum, i) => sum + (i.price * i.count), 0);

            if (total > 0) {
                tg.MainButton.setText(ОФОРМИТЬ ЗАКАЗ: ${total} ₽);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        tg.onEvent('mainButtonClicked', async () => {
            tg.MainButton.showProgress();
            
            const orderData = {
                user_id: tg.initDataUnsafe?.user?.id || 0,
                user_name: tg.initDataUnsafe?.user?.first_name || "Guest",
                items: Object.values(cart),
                total_price: Object.values(cart).reduce((sum, i) => sum + (i.price * i.count), 0)
            };

            try {
                const response = await fetch(${BASE_URL}/place_order, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    tg.showAlert("Заказ успешно отправлен администратору!");
                    tg.close();
                } else {
                    tg.showAlert("Ошибка сервера при отправке.");
                }
            } catch (e) {
                tg.showAlert("Не удалось связаться с сервером.");
            } finally {
                tg.MainButton.hideProgress();
            }
        });

        loadProducts();
    </script>
</body>
</html>
