<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkShop 3D Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 15px; }
        .product-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--tg-theme-secondary-bg-color); border-radius: 10px; padding: 10px; text-align: center; }
        .card img { width: 100%; border-radius: 8px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 8px; border-radius: 5px; width: 100%; margin-top: 5px; }
        .count-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .btn-small { width: 30%; padding: 5px; }
    </style>
</head>
<body>
    <h3 id="greeting">Мастерская</h3>
    <div class="product-list" id="products"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Ссылка обновится твоим скриптом автоматически
        const API_URL = "https://imported-car-photographs-combat.trycloudflare.com/get_products";
        const BASE_URL = API_URL.replace('/get_products', '');

        let cart = {};

        async function loadProducts() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const container = document.getElementById('products');
            data.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = 
                    <img src="${p.image}">
                    <h4>${p.name}</h4>
                    <p>${p.price}₽</p>
                    <div id="controls-${p.id}">
                        <button onclick="changeCount(${p.id}, '${p.name}', ${p.price}, 1)">В корзину</button>
                    </div>
                ;
                container.appendChild(div);
            });
        }

        function changeCount(id, name, price, delta) {
            if (!cart[id]) cart[id] = { name, price, count: 0 };
            cart[id].count += delta;

            if (cart[id].count <= 0) {
                delete cart[id];
                document.getElementById(controls-${id}).innerHTML = <button onclick="changeCount(${id}, '${name}', ${price}, 1)">В корзину</button>;
            } else {
                document.getElementById(controls-${id}).innerHTML = 
                    <div class="count-controls">
                        <button class="btn-small" onclick="changeCount(${id}, '${name}', ${price}, -1)">-</button>
                        <span>${cart[id].count}</span>
                        <button class="btn-small" onclick="changeCount(${id}, '${name}', ${price}, 1)">+</button>
                    </div>
                ;
            }
            updateMainButton();
        }

        function updateMainButton() {
            const items = Object.values(cart);
            const total = items.reduce((sum, i) => sum + (i.price * i.count), 0);
            if (total > 0) {
                tg.MainButton.setText(ОФОРМИТЬ ЗАКАЗ (${total}₽));
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        tg.onEvent('mainButtonClicked', async () => {
            tg.MainButton.showProgress();
            const orderData = {
                user_id: tg.initDataUnsafe.user?.id || 0,
                user_name: tg.initDataUnsafe.user?.first_name || "Guest",
                items: Object.values(cart),
                total_price: Object.values(cart).reduce((sum, i) => sum + (i.price * i.count), 0)
            };
            await fetch(${BASE_URL}/place_order, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderData)
            });
            tg.MainButton.hideProgress();
            tg.showAlert("Заказ отправлен!");
            tg.close();
        });

        loadProducts();
    </script>
</body>
</html>
