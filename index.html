<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Workshop Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: var(--tg-theme-button-color, #248bed); }
        body { font-family: sans-serif; margin: 0; padding: 0; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .cat-card { background: var(--tg-theme-secondary-bg-color); padding: 25px; margin-bottom: 12px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: bold; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .p-card { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 8px; text-align: center; }
        .p-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; }
        .counter { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; background: rgba(0,0,0,0.05); border-radius: 8px; padding: 4px; }
        .count-btn { background: var(--main-color); border: none; color: white; width: 28px; height: 28px; border-radius: 6px; font-size: 18px; }
        .detail-img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h2 style="margin-top:0;">Мастерская 🛠</h2>
        <div class="cat-card" onclick="showCategory('3D печать')">📦 3D печать</div>
        <div class="cat-card" onclick="showCategory('Лазерная гравировка')">🔥 Лазерная гравировка</div>
        <div class="cat-card" onclick="showCategory('Прочее')">⚙️ Прочее</div>
        <div id="loader" style="text-align:center; padding: 20px;">Загрузка товаров...</div>
    </div>

    <div id="page-list" class="page">
        <h2 id="cat-title">Товары</h2>
        <div id="product-list" class="product-grid"></div>
    </div>

    <div id="page-detail" class="page">
        <div id="product-detail"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let products = [];
        let cart = {};
        
        // ВСТАВЬ СВОЮ ССЫЛКУ НИЖЕ В КАВЫЧКИ
        // ОБЯЗАТЕЛЬНО ДОБАВЬ /get_products В КОНЦЕ
        const API_URL = "https://shy-loops-join.loca.lt/get_products";

        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                products = await response.json();
                document.getElementById('loader').style.display = 'none';
                console.log("Товары загружены:", products);
            } catch (e) {
                document.getElementById('loader').innerHTML = <b style="color:red">Ошибка связи с сервером</b>;
                console.error(e);
            }
        }

        loadProducts();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            id === 'page-home' ? tg.BackButton.hide() : tg.BackButton.show();
        }

        tg.BackButton.onClick(() => {
            document.getElementById('page-detail').classList.contains('active') ? showPage('page-list') : showPage('page-home');
        });

        function showCategory(cat) {
            document.getElementById('cat-title').innerText = cat;
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            const filtered = products.filter(p => p.category === cat);
            
            if (filtered.length === 0) {
                list.innerHTML = '<p style="grid-column: 1/3; text-align:center; opacity:0.6;">Товаров пока нет</p>';
            }
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'p-card';
                card.innerHTML = 
                    <img src="${p.main_photo}" onclick="showProduct(${p.id})">
                    <h4 style="margin:8px 0 4px; font-size:14px;">${p.name}</h4>
                    <div style="font-weight:bold; color:var(--main-color); margin-bottom:8px;">${p.price} ₽</div>
                    <div class="counter">
                        <button class="count-btn" onclick="updateCart(${p.id}, -1)">-</button>
                        <span id="qty-${p.id}">${cart[p.id] || 0}</span>
                        <button class="count-btn" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                ;
                list.appendChild(card);
            });
            showPage('page-list');
        }

        function showProduct(id) {
            const p = products.find(i => i.id === id);
            const detail = document.getElementById('product-detail');
            detail.innerHTML = 
                <img src="${p.main_photo}" class="detail-img">
                <h2>${p.name}</h2>
                <div style="font-size:20px; font-weight:bold; color:var(--main-color); margin-bottom:15px;">${p.price} ₽</div>
                <p>${p.description || 'Описание отсутствует'}</p>
                <button class="count-btn" style="width:100%; height:45px; margin-top:20px;" onclick="updateCart(${p.id}, 1); showPage('page-list');">
                    Добавить в заказ
                </button>
            ;
            showPage('page-detail');
        }

        function updateCart(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            const qtyLabel = document.getElementById(qty-${id});
            if (qtyLabel) qtyLabel.innerText = cart[id] || 0;
            updateMainButton();
        }

        function updateMainButton() {
            let count = Object.values(cart).reduce((a, b) => a + b, 0);
            if (count > 0) {
                tg.MainButton.setText(ПОДТВЕРДИТЬ ЗАКАЗ (${count}));
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        tg.MainButton.onClick(() => {
            let summary = [];
            for (let id in cart) {
                let p = products.find(i => i.id == id);
                summary.push({ name: p.name, qty: cart[id], price: p.price });
            }
            tg.sendData(JSON.stringify(summary));
            tg.close();
        });
    </script>
</body>
</html>
